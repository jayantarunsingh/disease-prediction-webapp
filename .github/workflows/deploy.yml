name: Disease Prediction CI/CD

on:
  push:
    branches: [ "main", "master" ] # Runs whenever you push code to main or master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/disease-prediction-app:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/disease-prediction-app:latest

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update EKS Kubeconfig
        run: aws eks update-kubeconfig --name disease-prediction-cluster --region us-east-1

      - name: Deploy to EKS
        run: kubectl apply -f disease-app.yaml
