<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prediction Result</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-blue-100 via-purple-100 to-pink-100 min-h-screen flex flex-col items-center justify-center p-6">

  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-2xl text-center">
    <h1 class="text-3xl font-bold text-indigo-700 mb-4">🩺 Prediction Result</h1>

    <h2 class="text-2xl font-semibold text-green-700 mb-2">Disease: {{ disease }}</h2>

    <p class="text-gray-700 text-base mb-4">
      <strong>Description:</strong> {{ description }}
    </p>

    <div class="text-left bg-gray-50 p-4 rounded-lg shadow-inner mb-6">
      <h3 class="text-lg font-semibold text-indigo-600 mb-2">Recommended Precautions:</h3>
      <ul class="list-disc list-inside text-gray-700 space-y-1">
        {% for precaution in precautions %}
          <li>{{ precaution }}</li>
        {% endfor %}
      </ul>
    </div>

    <a href="/" 
       class="inline-block px-5 py-2 bg-indigo-600 text-white rounded-md shadow hover:bg-indigo-700 transition duration-200">
       🔙 Back to Home
    </a>
  </div>

  <footer class="mt-6 text-gray-600 text-sm">
    © 2025 AI-Powered Health System | Built with ❤️ by Jayant
  </footer>

</body>
</html>
