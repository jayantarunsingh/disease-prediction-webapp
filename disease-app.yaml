apiVersion: apps/v1
kind: Deployment
metadata:
  name: disease-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: disease-prediction
  template:
    metadata:
      labels:
        app: disease-prediction
    spec:
      containers:
      - name: disease-prediction
        image: jayant1054/disease-prediction-app:latest # Make sure this matches your Docker Hub image!
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: disease-prediction-service
spec:
  type: LoadBalancer
  selector:
    app: disease-prediction
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
