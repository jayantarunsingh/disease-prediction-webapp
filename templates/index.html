<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Powered Disease Predictor App</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-r from-blue-100 via-purple-100 to-pink-100 min-h-screen flex flex-col items-center justify-center p-6">

  <div class="bg-white shadow-2xl rounded-2xl p-8 w-full max-w-3xl">
    <h1 class="text-3xl font-bold text-center text-indigo-700 mb-6">🩺 Powered Disease Prediction</h1>
    
    <form action="/predict" method="post" class="space-y-4">
      <div>
        <label class="block text-lg font-semibold text-gray-700 mb-2">Select Symptoms:</label>
        <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 h-64 overflow-y-auto border p-3 rounded-md shadow-inner">
          {% for symptom in symptoms %}
            <label class="flex items-center space-x-2">
              <input type="checkbox" name="symptoms" value="{{ symptom }}" class="h-4 w-4 text-indigo-600 border-gray-300 rounded">
              <span class="text-gray-700 text-sm">{{ symptom.replace('_', ' ').title() }}</span>
            </label>
          {% endfor %}
        </div>
      </div>

      <div class="flex justify-center">
        <input type="submit" value="Predict Disease"
          class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-md shadow hover:bg-indigo-700 transition duration-200">
      </div>
    </form>
  </div>

  <footer class="mt-6 text-gray-600 text-sm">
    © 2025 AI-Powered Health System | Built with ❤️ by Jayant
  </footer>

</body>
</html>
